services:
  postgres-test:
    image: postgres:16-alpine
    ports:
      - "5433:5432"
    environment:
      POSTGRES_USER: dreamapi_test
      POSTGRES_PASSWORD: dreamapi_test
      POSTGRES_DB: dreamapi_test
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U dreamapi_test"]
      interval: 5s
      timeout: 5s
      retries: 5

  redis-test:
    image: redis:7-alpine
    ports:
      - "6380:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5
